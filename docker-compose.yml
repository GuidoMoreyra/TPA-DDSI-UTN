services:
  mysql:
    image: mysql:8.0
    container_name: tpa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: tp-ddsi
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tpa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tpa-app
    ports:
      - "9001:9001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: tp-ddsi
      DB_USER: root
      DB_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tpa-network
    restart: unless-stopped

networks:
  tpa-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
