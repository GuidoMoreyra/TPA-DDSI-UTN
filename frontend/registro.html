<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - MetaMapa</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 class="navbar-brand" style="display: inline-block;">MetaMapa</h1>
      </div>

      <h2 class="auth-title">Crear Cuenta</h2>
      <p class="auth-subtitle">Únete a la comunidad de contribuyentes</p>

      <div id="registroError" class="alert alert-error hidden">
        <strong>Error:</strong> <span id="registroErrorMessage"></span>
      </div>

      <div id="registroSuccess" class="alert alert-success hidden">
        ¡Cuenta creada exitosamente! Redirigiendo...
      </div>

      <form id="registroForm" onsubmit="return handleRegistro(event)">
        <div class="form-group">
          <label class="form-label required" for="nombre">Nombre Completo</label>
          <input
            type="text"
            class="form-input"
            id="nombre"
            name="nombre"
            placeholder="Juan Pérez"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label required" for="email">Correo Electrónico</label>
          <input
            type="email"
            class="form-input"
            id="email"
            name="email"
            placeholder="tu@email.com"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label required" for="password">Contraseña</label>
          <input
            type="password"
            class="form-input"
            id="password"
            name="password"
            placeholder="••••••••"
            minlength="8"
            required
          >
          <span class="form-help">Mínimo 8 caracteres</span>
        </div>

        <div class="form-group">
          <label class="form-label required" for="passwordConfirm">Confirmar Contraseña</label>
          <input
            type="password"
            class="form-input"
            id="passwordConfirm"
            name="passwordConfirm"
            placeholder="••••••••"
            required
          >
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" class="form-checkbox" name="terminos" required>
            Acepto los <a href="#" style="color: var(--color-primary);">términos y condiciones</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-full">Crear Cuenta</button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center; padding-top: 1.5rem; border-top: 1px solid var(--color-gray-200);">
        <p style="color: var(--color-gray-600); font-size: 0.875rem;">
          ¿Ya tienes cuenta? <a href="login.html" style="color: var(--color-primary); font-weight: 500;">Inicia sesión aquí</a>
        </p>
        <p style="margin-top: 0.5rem;">
          <a href="index.html" style="color: var(--color-gray-600); font-size: 0.875rem;">← Volver al inicio</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
