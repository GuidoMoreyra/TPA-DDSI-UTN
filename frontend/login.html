<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - MetaMapa</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 class="navbar-brand" style="display: inline-block;">MetaMapa</h1>
      </div>

      <h2 class="auth-title">Iniciar Sesión</h2>
      <p class="auth-subtitle">Accede a tu cuenta para contribuir</p>

      <div id="loginSuccess" class="alert alert-success hidden">
        ¡Inicio de sesión exitoso! Redirigiendo...
      </div>

      <div id="loginError" class="alert alert-error hidden">
        <strong>Error:</strong> <span id="loginErrorMessage"></span>
      </div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="form-label required" for="email">Correo Electrónico</label>
          <input
            type="email"
            class="form-input"
            id="email"
            name="email"
            placeholder="tu@email.com"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label required" for="password">Contraseña</label>
          <input
            type="password"
            class="form-input"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          >
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" class="form-checkbox" name="remember">
            Recordarme
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-full">Iniciar Sesión</button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center; padding-top: 1.5rem; border-top: 1px solid var(--color-gray-200);">
        <p style="color: var(--color-gray-600); font-size: 0.875rem;">
          ¿No tienes cuenta? <a href="registro.html" style="color: var(--color-primary); font-weight: 500;">Regístrate aquí</a>
        </p>
        <p style="margin-top: 0.5rem;">
          <a href="index.html" style="color: var(--color-gray-600); font-size: 0.875rem;">← Volver al inicio</a>
        </p>
      </div>

      <!-- Opcional: SSO -->
      <div style="margin-top: 2rem;">
        <div style="position: relative; text-align: center; margin-bottom: 1rem;">
          <span style="background-color: white; padding: 0 1rem; color: var(--color-gray-500); font-size: 0.875rem; position: relative; z-index: 1;">O continuar con</span>
          <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background-color: var(--color-gray-200);"></div>
        </div>

        <button type="button" class="btn btn-outline w-full" onclick="loginConKeycloak()">
          🔐 Iniciar Sesión con SSO (Keycloak)
        </button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
